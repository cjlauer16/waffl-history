<style>
:root {
  --bg:#0f1117; --surface:#1a1f2e; --surface2:#222840;
  --border:#2a3040; --text:#e8eaf0; --muted:#8892a4;
  --accent:#4f9cf9; --gold:#f5c542; --green:#4ade80;
  --red:#f87171; --silver:#c0c0c0; --bronze:#cd7f32;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
code{background:#1e2840;padding:.15em .45em;border-radius:4px;font-family:monospace;font-size:.88em}

/* Header */
.site-header{background:#141824;border-bottom:1px solid var(--border);padding:1.25rem 2rem 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.league-title{font-size:1.55rem;font-weight:800;color:var(--gold);letter-spacing:-.5px}
.generated-at{color:var(--muted);font-size:.75rem}
.tabs{display:flex;overflow-x:auto;gap:0;padding-bottom:0}
.tab-btn{padding:.65rem 1.2rem;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:500;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Layout */
.content{max-width:1200px;margin:0 auto;padding:2rem}
.section{margin-bottom:2.5rem}
.section-title{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2.5rem}

/* Champion banner */
.champion-banner{background:linear-gradient(135deg,#2a1f0a,#1a1208);border:1px solid var(--gold);border-radius:12px;padding:1.5rem 2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem}
.champion-trophy{font-size:2.8rem}
.champion-label{color:var(--gold);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.champion-name{font-size:1.75rem;font-weight:800;color:var(--gold)}
.champion-sub{color:var(--muted);font-size:.88rem;margin-top:.3rem}

/* Quick stats */
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.5rem}
.stat-label{color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.stat-value{font-size:1.55rem;font-weight:700}
.stat-sub{color:var(--muted);font-size:.78rem;margin-top:.2rem}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead th{color:var(--muted);font-weight:600;font-size:.73rem;text-transform:uppercase;letter-spacing:.5px;padding:.6rem .8rem;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th.sort-asc::after{content:' ▲';font-size:.65rem}
thead th.sort-desc::after{content:' ▼';font-size:.65rem}
tbody tr{border-bottom:1px solid #1e2433;transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:.65rem .8rem}
.rank-cell{color:var(--muted);font-weight:700;width:2.5rem}
.team-cell{font-weight:600}

/* Finish colors */
.f-champ{color:var(--gold);font-weight:700}
.f-runner{color:var(--silver);font-weight:600}
.f-third{color:var(--bronze);font-weight:600}
.f-made{color:var(--accent)}
.f-missed{color:var(--muted)}
.f-last{color:var(--red)}

/* Highlights */
.highlights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}
.highlight-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.highlight-icon{font-size:1.4rem;margin-bottom:.5rem}
.highlight-type{color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem}
.highlight-main{font-size:.97rem;font-weight:700;margin-bottom:.25rem}
.highlight-detail{color:var(--muted);font-size:.83rem}

/* Playoff bracket */
.bracket-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.bracket-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.bracket-card-title{font-weight:700;font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.9rem}
.place-row{display:flex;align-items:center;gap:.7rem;padding:.45rem 0;border-bottom:1px solid var(--border)}
.place-row:last-child{border:none}
.place-icon{font-size:1.1rem;width:1.8rem;text-align:center}
.place-label{color:var(--muted);font-size:.78rem;width:7rem}
.place-name{font-weight:600}

/* Manager stats colors */
.eff-good{color:var(--green)}
.eff-bad{color:var(--red)}
.mis-zero{color:var(--green)}
.mis-some{color:var(--gold)}
.mis-many{color:var(--red)}
.pf-pos{color:var(--green)}
.pf-neg{color:var(--red)}
.table-hint{color:var(--muted);font-size:.72rem;margin-top:.5rem;font-style:italic}

/* AI recap */
.ai-card{background:linear-gradient(135deg,#1a2035,#151c2e);border:1px solid #3040a0;border-radius:10px;overflow:hidden}
.ai-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;cursor:pointer;background:rgba(79,156,249,.05)}
.ai-header:hover{background:rgba(79,156,249,.1)}
.ai-header-title{font-weight:700;color:var(--accent);display:flex;align-items:center;gap:.5rem;font-size:.93rem}
.ai-toggle{color:var(--muted);font-size:.78rem}
.ai-body{padding:1.5rem;border-top:1px solid #3040a0;display:none}
.ai-body.open{display:block}
.ai-text{color:#c8d0e0;line-height:1.8;font-size:.9rem}
.ai-text h1,.ai-text h2,.ai-text h3{color:var(--accent);margin:1.2rem 0 .4rem;font-size:1rem;letter-spacing:.04em;text-transform:uppercase}
.ai-text h1{font-size:1.1rem;border-bottom:1px solid #3040a0;padding-bottom:.3rem}
.ai-text p{margin:.3rem 0}
.ai-text ul,.ai-text ol{margin:.4rem 0 .4rem 1.4rem;padding:0}
.ai-text li{margin:.2rem 0}
.ai-text strong{color:#e8eaf6;font-weight:700}
.ai-text em{color:#b0c4de;font-style:italic}
.ai-text code{background:#0d1117;padding:.1em .35em;border-radius:3px;font-size:.82rem;color:#79b8ff}
.ai-text hr{border:none;border-top:1px solid #3040a0;margin:1rem 0}
.ai-text br{display:block;margin:.2rem 0;content:""}
.ai-hint{color:var(--muted);font-size:.73rem;margin-top:1rem;font-style:italic}

/* All-time champions */
.alltime-champs{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.champ-card{background:linear-gradient(135deg,#2a1f0a,#1a1208);border:1px solid var(--gold);border-radius:10px;padding:1rem 1.4rem;display:flex;align-items:center;gap:1rem}
.champ-rings{display:flex;gap:.25rem;flex-wrap:wrap}
.ring{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);border-radius:50%;font-size:.72rem;font-weight:700;color:#1a0a00}
.champ-team{font-weight:700;color:var(--gold)}
.champ-years{color:var(--muted);font-size:.78rem}
.no-data{color:var(--muted);font-style:italic;padding:.75rem 0}

@media(max-width:768px){
  .content{padding:1rem}
  .quick-stats{grid-template-columns:repeat(2,1fr)}
  .highlights-grid,.bracket-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
}
</style>

// ── Utilities ────────────────────────────────────────────────────────────────

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(n,d=2){return Number(n||0).toFixed(d);}
function finishClass(f){
  if(!f) return '';
  const l=f.toLowerCase();
  if(l.includes('champion')) return 'f-champ';
  if(l.includes('runner')) return 'f-runner';
  if(l.includes('3rd')) return 'f-third';
  if(l.includes('missed')) return 'f-missed';
  if(l.includes('last')||l.includes('12th')) return 'f-last';
  return 'f-made';
}
function makeSortable(tbl){
  const ths=tbl.querySelectorAll('thead th');
  let col=-1,dir=1;
  ths.forEach((th,i)=>{
    th.addEventListener('click',()=>{
      dir = col===i ? -dir : 1;
      col=i;
      ths.forEach(h=>h.classList.remove('sort-asc','sort-desc'));
      th.classList.add(dir===1?'sort-asc':'sort-desc');
      const tb=tbl.querySelector('tbody');
      [...tb.querySelectorAll('tr')].sort((a,b)=>{
        const av=a.cells[i]?.dataset.sort??a.cells[i]?.textContent??'';
        const bv=b.cells[i]?.dataset.sort??b.cells[i]?.textContent??'';
        const an=parseFloat(av),bn=parseFloat(bv);
        return !isNaN(an)&&!isNaN(bn) ? dir*(an-bn) : dir*av.localeCompare(bv);
      }).forEach(r=>tb.appendChild(r));
    });
  });
}

function mdToHtml(text){
  // Escape raw HTML first so no injected tags survive
  const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = text.split('\n');
  let html = '';
  let inList = false;

  for(let i = 0; i < lines.length; i++){
    let line = lines[i];

    // Headings
    if(/^### /.test(line)){
      if(inList){ html += '</ul>'; inList=false; }
      html += `<h3>${e(line.slice(4))}</h3>`;
      continue;
    }
    if(/^## /.test(line)){
      if(inList){ html += '</ul>'; inList=false; }
      html += `<h2>${e(line.slice(3))}</h2>`;
      continue;
    }
    if(/^# /.test(line)){
      if(inList){ html += '</ul>'; inList=false; }
      html += `<h1>${e(line.slice(2))}</h1>`;
      continue;
    }

    // Bullet list items
    if(/^[-*] /.test(line)){
      if(!inList){ html += '<ul>'; inList=true; }
      const content = inlineFormat(e(line.slice(2)));
      html += `<li>${content}</li>`;
      continue;
    }

    // Numbered list items
    if(/^\d+\. /.test(line)){
      if(!inList){ html += '<ol>'; inList=true; }
      const content = inlineFormat(e(line.replace(/^\d+\. /,'')));
      html += `<li>${content}</li>`;
      continue;
    }

    // Close list on non-list line
    if(inList){ html += inList === 'ol' ? '</ol>' : '</ul>'; inList=false; }

    // Blank line = paragraph break
    if(line.trim() === ''){
      html += '<br>';
      continue;
    }

    // Horizontal rule
    if(/^---+$/.test(line.trim())){
      html += '<hr>';
      continue;
    }

    // Regular paragraph line
    html += `<p>${inlineFormat(e(line))}</p>`;
  }

  if(inList) html += '</ul>';
  return html;
}

function inlineFormat(s){
  // Bold+italic ***text***
  s = s.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold **text**
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // Inline code `text`
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  return s;
}

function renderAiRecap(s){
  if(!s.ai_recap){
    return `
    <div class="section">
      <div class="section-title">AI Season Recap</div>
      <div class="ai-card">
        <div class="ai-header" onclick="toggleAi('ai-${s.year}')">
          <span class="ai-header-title">✨ AI Season Recap — ${esc(s.year)}</span>
          <span class="ai-toggle" id="ai-${s.year}-tog">Generate ▼</span>
        </div>
        <div class="ai-body" id="ai-${s.year}">
          <p class="ai-hint">Run <code>python generate_league_history.py --ai</code> to generate AI-powered season recaps via Claude.</p>
        </div>
      </div>
    </div>`;
  }
  return `
  <div class="section">
    <div class="section-title">AI Season Recap</div>
    <div class="ai-card">
      <div class="ai-header" onclick="toggleAi('ai-${s.year}')">
        <span class="ai-header-title">✨ AI Season Recap — ${esc(s.year)}</span>
        <span class="ai-toggle" id="ai-${s.year}-tog">Show ▼</span>
      </div>
      <div class="ai-body" id="ai-${s.year}">
        <div class="ai-text">${mdToHtml(s.ai_recap)}</div>
        <p class="ai-hint">Generated by Claude · Refresh with <code>python generate_league_history.py --ai</code></p>
      </div>
    </div>
  </div>`;
}

function toggleAi(id){
  const body=document.getElementById(id);
  const tog=document.getElementById(id+'-tog');
  const open=body.classList.toggle('open');
  tog.textContent=open?'Hide ▲':'Show ▼';
}

function renderSeason(s){
  return [
    renderChampionBanner(s),
    renderQuickStats(s),
    renderStandings(s),
    renderPlayoffResults(s),
    renderManagerStats(s),
    renderHighlights(s),
    renderAiRecap(s),
  ].join('');
}

// ── All-time rendering ───────────────────────────────────────────────────────

function renderAllTime(data){
  const at=data.all_time||{};
  const records=at.records||[];
  const seasons=at.season_champions||[];

  // Champion cards
  const champs=records.filter(r=>r.championships&&r.championships.length)
    .sort((a,b)=>b.championships.length-a.championships.length);

  const champCards=champs.length ? champs.map(t=>{
    const rings=t.championships.map(y=>`<span class="ring" title="${y}">${String(y).slice(2)}</span>`).join('');
    const hist=t.team_history||{};
    const histLabels=t.championships.map(y=>hist[y]||t.team).join(', ');
    return `<div class="champ-card">
      <div class="champ-rings">${rings}</div>
      <div><div class="champ-team">${esc(t.team)}</div>
      <div class="champ-years" title="${esc(histLabels)}">${t.championships.join(', ')}</div></div>
    </div>`;
  }).join('') : '<p class="no-data">No championships yet</p>';

  // All-time records table
  const recRows=records.map((r,i)=>{
    const wpct=(r.win_pct*100).toFixed(1)+'%';
    const ringStr=r.championships.length ? '🏆'.repeat(r.championships.length) : '—';
    const playoffs=r.playoff_count>0 ? `${r.playoff_count}x (${r.playoff_years.join(', ')})` : '0';
    // Build name history tooltip
    const hist=r.team_history||{};
    const histTip=Object.entries(hist).sort().map(([y,n])=>`${y}: ${n}`).join(' | ');
    const nameCell=r.user_name!==r.team
      ? `<span title="${esc(histTip)}">${esc(r.team)}</span><br><small style="color:var(--muted);font-size:.72rem">${esc(r.user_name)}</small>`
      : `<span title="${esc(histTip)}">${esc(r.team)}</span>`;
    return `<tr>
      <td class="rank-cell">${i+1}</td>
      <td class="team-cell">${nameCell}</td>
      <td>${r.wins}-${r.losses}</td>
      <td data-sort="${r.win_pct}">${wpct}</td>
      <td data-sort="${r.total_pf}">${Number(r.total_pf).toFixed(1)}</td>
      <td>${ringStr}</td>
      <td>${esc(playoffs)}</td>
    </tr>`;
  }).join('');

  // All-time weekly score records banner
  const wr=data.all_time.weekly_records||{};
  const wrHtml=`
  <div class="highlights-grid" style="margin-bottom:1.5rem">
    ${wr.high?`<div class="highlight-card">
      <div class="highlight-icon">🔥</div>
      <div class="highlight-type">All-Time High Score</div>
      <div class="highlight-main">${esc(wr.high.team)}</div>
      <div class="highlight-detail">${wr.high.year} Week ${wr.high.week} — <strong>${Number(wr.high.score).toFixed(2)} pts</strong></div>
    </div>`:''}
    ${wr.low?`<div class="highlight-card">
      <div class="highlight-icon">🥶</div>
      <div class="highlight-type">All-Time Low Score</div>
      <div class="highlight-main">${esc(wr.low.team)}</div>
      <div class="highlight-detail">${wr.low.year} Week ${wr.low.week} — <strong>${Number(wr.low.score).toFixed(2)} pts</strong></div>
    </div>`:''}
  </div>`;

  // Season-by-season summary with weekly records
  const sumRows=seasons.map(c=>{
    const h=c.high;
    const l=c.low;
    return `<tr>
      <td class="rank-cell">${c.year}</td>
      <td class="f-champ">${esc(c.champion||'TBD')}</td>
      <td class="f-runner">${esc(c.runner_up||'—')}</td>
      <td class="f-last">${esc(c.last_place||'—')}</td>
      <td>${h?`${esc(h.team)} (Wk ${h.week}, ${Number(h.score).toFixed(2)})`:'—'}</td>
      <td>${l?`${esc(l.team)} (Wk ${l.week}, ${Number(l.score).toFixed(2)})`:'—'}</td>
    </tr>`;
  }).join('');

  return `
  <div class="section">
    <div class="section-title">Champions</div>
    <div class="alltime-champs">${champCards}</div>
  </div>
  <div class="section">
    <div class="section-title">All-Time Weekly Score Records</div>
    ${wrHtml}
  </div>
  <div class="section">
    <div class="section-title">All-Time Records (Regular Season)</div>
    <table id="at-records">
      <thead><tr>
        <th>#</th><th>Manager</th><th>Record</th><th>Win%</th>
        <th>Total PF</th><th>Championships</th><th>Playoff Appearances</th>
      </tr></thead>
      <tbody>${recRows}</tbody>
    </table>
  </div>
  <div class="section">
    <div class="section-title">Season-by-Season</div>
    <table id="at-seasons">
      <thead><tr>
        <th>Season</th><th>Champion</th><th>Runner-Up</th><th>Last Place</th>
        <th>High Score</th><th>Low Score</th>
      </tr></thead>
      <tbody>${sumRows}</tbody>
    </table>
  </div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────

function showTab(key){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.key===String(key)));
  const content=document.getElementById('content');
  if(key==='alltime'){
    content.innerHTML=renderAllTime(DATA);
  } else {
    const s=DATA.seasons.find(s=>s.year===Number(key));
    if(!s){content.innerHTML='<p class="no-data">Season not found</p>';return;}
    content.innerHTML=renderSeason(s);
  }
  content.querySelectorAll('table').forEach(t=>makeSortable(t));
}

document.addEventListener('DOMContentLoaded',()=>{
  const tabs=document.getElementById('tabs');
  DATA.seasons.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='tab-btn';
    btn.textContent=s.year;
    btn.dataset.key=s.year;
    btn.addEventListener('click',()=>showTab(s.year));
    tabs.appendChild(btn);
  });
  const allBtn=document.createElement('button');
  allBtn.className='tab-btn';
  allBtn.textContent='All-Time';
  allBtn.dataset.key='alltime';
  allBtn.addEventListener('click',()=>showTab('alltime'));
  tabs.appendChild(allBtn);

  // Default to most recent season
  if(DATA.seasons.length) showTab(DATA.seasons[DATA.seasons.length-1].year);
});
</script>
</body>
</html>
